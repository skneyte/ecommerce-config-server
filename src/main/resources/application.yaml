spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/skneyte/microservices-config-data.git
          username: ${GITHUB_USER}
          password: ${GITHUB_TOKEN}
          clone-on-start: true
          default-label: main

server:
  port: ${PORT:8888}
