spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/skneyte/microservices-config-data.git
          clone-on-start: true
          default-label: main
          force-pull: true
          refresh-rate: 0
          username: ${GITHUB_USER}
          password: ${GITHUB_TOKEN}

server:
  port: ${PORT:8888}
